<!-- Show navbar only when NOT on login page -->
<nav *ngIf="showNavbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/home">Employee Management</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="active">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/employee" routerLinkActive="active">Employee</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/rewards" routerLinkActive="active">Rewards</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div [class.container-fluid]="showNavbar" [class.mt-3]="showNavbar">
  <router-outlet></router-outlet>
</div>
