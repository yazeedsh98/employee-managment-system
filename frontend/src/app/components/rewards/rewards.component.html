<div class="container-fluid mt-4">
  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
          <h4 class="mb-0">
            <i class="bi bi-trophy-fill me-2"></i>Rewards List
          </h4>
          <a routerLink="/assign-reward" class="btn btn-dark btn-sm">
            <i class="bi bi-trophy-fill me-2"></i>Assign Reward
          </a>
        </div>
        <div class="card-body">
          <!-- Loading State -->
          <div *ngIf="isLoading" class="text-center py-5">
            <div class="spinner-border text-warning" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Loading rewards...</p>
          </div>

          <!-- Rewards Table -->
          <div *ngIf="!isLoading && rewards.length > 0" class="table-responsive">
            <table class="table table-striped table-hover">
              <thead class="table-dark">
                <tr>
                  <th scope="col">#</th>
                  <th scope="col">Reward Name</th>
                  <th scope="col">Type</th>
                  <th scope="col">Date Awarded</th>
                  <th scope="col">Points</th>
                  <th scope="col" class="text-center">Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let reward of rewards; let i = index">
                  <th scope="row">{{ i + 1 }}</th>
                  <td>{{ reward.rewardName }}</td>
                  <td>
                    <span class="badge bg-warning text-dark">
                      {{ getRewardTypeLabel(reward.type) }}
                    </span>
                  </td>
                  <td>{{ reward.dateAwarded | date:'shortDate' }}</td>
                  <td>
                    <span class="badge bg-success">{{ reward.points }}</span>
                  </td>
                  <td class="text-center">
                    <button 
                      class="btn btn-sm btn-warning me-1" 
                      (click)="editReward(reward.id!)"
                      title="Edit">
                      <i class="bi bi-pencil"></i>
                    </button>
                    <button 
                      class="btn btn-sm btn-danger" 
                      (click)="deleteReward(reward.id!)"
                      title="Delete">
                      <i class="bi bi-trash"></i>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Empty State -->
          <div *ngIf="!isLoading && rewards.length === 0" class="text-center py-5">
            <i class="bi bi-inbox fs-1 text-muted"></i>
            <p class="text-muted mt-3">No rewards found</p>
            <a routerLink="/assign-reward" class="btn btn-warning mt-3">
              <i class="bi bi-trophy-fill me-2"></i>Assign First Reward
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
