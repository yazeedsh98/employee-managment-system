# Remove version line - it's obsolete

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: employee-management-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:employeedb
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - employee-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: employee-management-frontend
    ports:
      - "4200:8080"  # Host:Container - Access on localhost:4200
    depends_on:
      - backend
    networks:
      - employee-network
    restart: unless-stopped

networks:
  employee-network:
    driver: bridge